# Психологический профиль генералиста — опорные тезисы позиционирования.
# Каждый заземлён на факт из истории, не маркетинговый воздух.
disposition:
  archetype: Технологический генералист на стыке бизнеса, инженерии и данных
  shape: >
    T-shaped: широкий охват (бизнес ↔ код ↔ данные ↔ инфра), глубина — в
    AI/RAG-интеграциях и анализе данных.
  traits:
    - id: bridge
      text: "Соединяет бизнес-цели и инженерную реализацию: «могу посчитать unit-экономику — и сам поправлю баг на проде»."
      evidence: [Маркетинг-аналитика major + ML minor, founder + разработчик]
      roles: [tpm, ai-fullstack, analyst]
    - id: owner
      text: "Founder/owner-mindset: берёт end-to-end ответственность, в одиночку доводит MVP до прода, чтобы быстро проверить гипотезу."
      evidence: [3 запущенных micro-SaaS, self-hosting инфры]
      roles: [tpm, ai-fullstack]
    - id: quantitative
      text: "Количественное/вероятностное мышление: матстат, симуляции, Monte Carlo как рабочий инструмент, а не теория."
      evidence: [GPA 9.5 minor ML, симуляции тервера на Python, B2B-модели спроса]
      roles: [analyst, tpm]
    - id: fast-learner
      text: "Быстрый самоучка, комфортен в неопределённости — осваивает новый инструмент под задачу за вечер."
      evidence: [путь школа→веб→AI→инфра без формального CS]
      roles: [ai-fullstack, devops]
    - id: autonomy
      text: "Автономность и самодостаточность: сам держит инфраструктуру, homelab, полный цикл владения."
      evidence: [Hetzner, Coolify, Proxmox/Raspberry Pi homelab]
      roles: [devops, ai-fullstack]
    - id: risk-reducer
      text: "Снижает риски ранней команды: один человек закрывает прототип, аналитику и деплой."
      roles: [tpm]
  # Честный трейд-офф генералиста — держим в уме, в CV не выносим
  tradeoff: >
    Генералист → не глубочайший узкий специалист в одной вертикали (напр. чистый
    K8s-инженер или ML-исследователь). Компенсирует скоростью, охватом и
    самостоятельностью. Под узкие вакансии — закрывать целевыми пет-проектами.

